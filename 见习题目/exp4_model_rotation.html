<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>实验4：加载3DTiles模型并实现旋转交互</title>
    <script src="Cesium-1.40/Build/Cesium/Cesium.js"></script>
    <style>
        @import url(Cesium-1.40/Build/Cesium/Widgets/widgets.css);
        html, body, #cesiumContainer {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
        }
        #info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 5px;
            font-family: Arial, sans-serif; font-size: 14px; z-index: 100;
        }
        #controls {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 5px;
            font-family: Arial, sans-serif; font-size: 13px; z-index: 100;
        }
        button {
            padding: 8px 16px; margin: 5px; cursor: pointer;
            background: #2E75B6; color: white; border: none;
            border-radius: 4px; font-size: 13px; min-width: 70px;
        }
        button:hover { background: #1a5a96; }
        #angleInfo {
            position: absolute; bottom: 20px; left: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 15px; border-radius: 5px;
            font-family: Arial, sans-serif; font-size: 13px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="info">实验4：加载3DTiles模型实现旋转交互</div>
    <div id="controls">
        <button onclick="rotateX()">绕X轴旋转</button>
        <button onclick="rotateY()">绕Y轴旋转</button>
        <button onclick="rotateZ()">绕Z轴旋转</button>
        <button onclick="resetRotation()">重置旋转</button>
    </div>
    <div id="angleInfo">旋转角度: X=0° Y=0° Z=0°</div>
    <script>
        var viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            }),
            homeButton: false,
            sceneModePicker: false,
            baseLayerPicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            vrButton: false
        });

        var tileset = viewer.scene.primitives.add(new Cesium.Cesium3DTileset({
            url: 'Tileset/tileset.json'
        }));

        var anglex = 0, angley = 0, anglez = 0;
        var originalMatrix = null;

        tileset.readyPromise.then(function() {
            originalMatrix = Cesium.Matrix4.clone(tileset.modelMatrix);
            viewer.camera.flyTo({
                destination: tileset.boundingSphere.center,
                duration: 2
            });
        });

        function updateAngleInfo() {
            document.getElementById('angleInfo').textContent =
                '旋转角度: X=' + anglex + '° Y=' + angley + '° Z=' + anglez + '°';
        }

        function rotateX() {
            if (!originalMatrix) return;
            anglex += 1;
            var rotMat = Cesium.Matrix3.fromRotationX(Cesium.Math.toRadians(anglex));
            tileset.modelMatrix = Cesium.Matrix4.multiplyByMatrix3(originalMatrix, rotMat, new Cesium.Matrix4());
            updateAngleInfo();
        }

        function rotateY() {
            if (!originalMatrix) return;
            angley += 1;
            var rotMat = Cesium.Matrix3.fromRotationY(Cesium.Math.toRadians(angley));
            tileset.modelMatrix = Cesium.Matrix4.multiplyByMatrix3(originalMatrix, rotMat, new Cesium.Matrix4());
            updateAngleInfo();
        }

        function rotateZ() {
            if (!originalMatrix) return;
            anglez += 1;
            var rotMat = Cesium.Matrix3.fromRotationZ(Cesium.Math.toRadians(anglez));
            tileset.modelMatrix = Cesium.Matrix4.multiplyByMatrix3(originalMatrix, rotMat, new Cesium.Matrix4());
            updateAngleInfo();
        }

        function resetRotation() {
            if (!originalMatrix) return;
            anglex = 0; angley = 0; anglez = 0;
            tileset.modelMatrix = Cesium.Matrix4.clone(originalMatrix);
            updateAngleInfo();
        }
    </script>
</body>
</html>
