<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>实验2：Cesium三维地球添加立方体要素</title>
    <script src="Cesium-1.40/Build/Cesium/Cesium.js"></script>
    <style>
        @import url(Cesium-1.40/Build/Cesium/Widgets/widgets.css);
        html, body, #cesiumContainer {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
        }
        #info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 5px;
            font-family: Arial, sans-serif; font-size: 14px; z-index: 100;
        }
        #controls {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 15px; border-radius: 5px;
            font-family: Arial, sans-serif; font-size: 13px; z-index: 100;
        }
        button {
            padding: 8px 16px; margin: 5px; cursor: pointer;
            background: #2E75B6; color: white; border: none;
            border-radius: 4px; font-size: 13px;
        }
        button:hover { background: #1a5a96; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="info">实验2：三维场景中添加立方体要素</div>
    <div id="controls">
        <button onclick="addBox()">添加红色立方体</button>
        <button onclick="zoomToBox()">飞到立方体</button>
        <button onclick="removeBox()">移除立方体</button>
    </div>
    <script>
        var viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            }),
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            baseLayerPicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            vrButton: false
        });

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(-107.0, 40.0, 1000000),
            duration: 2
        });

        var redBox = null;

        function addBox() {
            if (redBox) return;
            redBox = viewer.entities.add({
                name: 'Red box with black outline',
                position: Cesium.Cartesian3.fromDegrees(-107.0, 40.0, 300000.0),
                box: {
                    dimensions: new Cesium.Cartesian3(400000.0, 300000.0, 500000.0),
                    material: Cesium.Color.RED.withAlpha(0.5),
                    outline: true,
                    outlineColor: Cesium.Color.BLACK
                }
            });
            zoomToBox();
        }

        function zoomToBox() {
            if (redBox) viewer.zoomTo(viewer.entities);
        }

        function removeBox() {
            if (redBox) {
                viewer.entities.remove(redBox);
                redBox = null;
            }
        }
    </script>
</body>
</html>
